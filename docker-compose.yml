services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    mem_limit: 8g
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal
    # Prefer an HTTP healthcheck over raw TCP so "healthy" matches real readiness.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    mem_limit: 8g
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal

  ingestion-api:
    build:
      context: ./ingestion-api
    container_name: ingestion-api
    restart: unless-stopped
    mem_limit: 1g
    env_file:
      - .env
    environment:
      # Core services
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL}"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION}"

      # Embeddings: use Ollama embeddings (ARM-safe, no extra container)
      # Your code must call Ollama /api/embeddings (model like nomic-embed-text)
      EMBEDDINGS_PROVIDER: "ollama"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"

      # ✅ Security memory corpus location (inside container)
      SECURITY_DATA_DIR: "/securitymemory/data"
      SECURITY_COLLECTION: "ExpandedVSCodeMemory"
      SECURITY_TOP_K: "6"
      SECURITY_CHUNK_CHARS: "1200"
      SECURITY_CHUNK_OVERLAP: "200"
      SECURITY_EMBED_MODEL: "${SECURITY_EMBED_MODEL:-nomic-embed-text}"
      SECURITY_EMBED_DIM: "${SECURITY_EMBED_DIM:-768}"
    volumes:
      # ✅ Mount host folder into container (read-only)
      - ./security-memory/data:/securitymemory/data:ro
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - internal
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read(); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 30

  nginx:
    image: nginx:1.27-alpine
    container_name: edge-nginx
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "8088:8088"
    environment:
      EDGE_API_KEY: "${EDGE_API_KEY}"
      NGINX_ENVSUBST_TEMPLATE_DIR: /etc/nginx/templates
    volumes:
      - ./nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      ingestion-api:
        condition: service_started
    networks:
      - internal

  gradio-ui:
    build:
      context: ./gradio-ui
    container_name: gradio-ui
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - "7860:7860"
    environment:
      API_BASE_URL: "http://edge-nginx:8088"
      EDGE_API_KEY: "${EDGE_API_KEY}"
      GRADIO_HTTP_TIMEOUT_S: "600"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:7860/', timeout=5).read(); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 30

networks:
  internal:
    driver: bridge

volumes:
  qdrant_data:
  ollama_data:
